name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn package -q
      - uses: actions/upload-artifact@v3
        with:
          name: ItaliaFactions
          path: target/ItaliaFactions-1.0.0.jar
